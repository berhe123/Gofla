services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gofla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gofla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gofla_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-gofla}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gofla}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gofla-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gofla-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-gofla}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-gofla_dev_password}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: gofla-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-gofla} ${S3_SECRET_KEY:-gofla_dev_password};
      mc mb --ignore-existing local/${S3_BUCKET:-gofla-products};
      mc anonymous set download local/${S3_BUCKET:-gofla-products};
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gofla-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: gofla-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gofla}:${POSTGRES_PASSWORD:-gofla_dev_password}@postgres:5432/${POSTGRES_DB:-gofla}?schema=public
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      MAIL_HOST: mailhog
      CORS_ORIGIN: http://localhost:5173,http://localhost:5180
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: gofla-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5180:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg-data:
  redis-data:
  minio-data:
